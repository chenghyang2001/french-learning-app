<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒數計時器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>倒數計時器</h1>

    <section class="add-form" aria-label="新增活動">
      <h2>新增活動</h2>
      <form id="activity-form" novalidate>
        <div class="form-group">
          <label for="activity-name">活動名稱</label>
          <input
            type="text"
            id="activity-name"
            name="name"
            placeholder="例如：生日派對、旅行出發"
            maxlength="100"
            autocomplete="off"
            aria-required="true"
          >
        </div>
        <div class="form-group">
          <label for="activity-date">目標日期與時間</label>
          <input
            type="datetime-local"
            id="activity-date"
            name="target_at"
            aria-required="true"
          >
        </div>
        <p id="form-error" class="form-error" role="alert" aria-live="polite"></p>
        <button type="submit" class="btn-primary">新增活動</button>
      </form>
    </section>

    <section class="activity-list-section" aria-label="活動清單">
      <h2>我的活動</h2>
      <div id="activity-list" role="list">
        <p class="empty-state" id="empty-state">尚無活動，請新增你的第一個活動</p>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
